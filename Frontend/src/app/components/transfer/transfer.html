<div class="transfer-container">

    <div class="transfer-card">

        <h2>Transfer Money</h2>

        <div class="balance-box" *ngIf="user">

            <h5>Available Balance</h5>

            <h3>₹ {{user.balance}}</h3>

        </div>

        <div class="mb-3">

            <label>From Account</label>

            <input
                class="form-control"
                [value]="fromAccount"
                readonly>

        </div>

        <div class="mb-3">

            <label>To Account</label>

            <input
                class="form-control"
                [(ngModel)]="toAccount"
                placeholder="Enter Receiver Account">

        </div>

        <div class="mb-4">

            <label>Amount</label>

            <input
                type="number"
                class="form-control"
                [(ngModel)]="amount"
                placeholder="Enter Amount">

        </div>

        <button
            class="btn transfer-btn w-100"
            (click)="transferMoney()">

            Transfer Money

        </button>

        <div
            class="alert alert-success mt-4"
            *ngIf="successMessage">

            {{successMessage}}

        </div>

        <div
            class="alert alert-danger mt-4"
            *ngIf="errorMessage">

            {{errorMessage}}

        </div>

    </div>

</div>
